<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mysterious Moon Story</title>

  <style>

    /* Night aesthetic background */

    body {

      margin: 0;

      font-family: 'Georgia', serif;

      background: radial-gradient(ellipse at bottom, #0a0a1a 0%, #000010 100%);

      color: #e0e0ff;

      text-align: center;

      padding: 30px;

      height: 100vh;

      display: flex;

      flex-direction: column;

      justify-content: center;

      align-items: center;

      overflow: hidden;

    }

    /* Stars overlay */

    body::after {

      content: "";

      position: absolute;

      top:0; left:0;

      width:100%; height:100%;

      background: transparent url('https://i.postimg.cc/3x3Q7ZVx/stars.png') repeat;

      animation: twinkle 20s linear infinite;

      z-index: 0;

    }

    @keyframes twinkle {

      0% {background-position: 0 0;}

      100% {background-position: 10000px 5000px;}

    }

    h1 {

      color: #c0c0ff;

      font-size: 2em;

      margin-bottom: 20px;

      z-index: 1;

      position: relative;

    }

    .story {

      font-size: 1.2em;

      line-height: 1.6;

      margin: 20px 0;

      max-width: 400px;

      z-index: 1;

      position: relative;

    }

    button {

      background: radial-gradient(circle, #8c9eff, #4b3bff);

      color: #fff;

      border: none;

      padding: 10px 20px;

      margin: 5px;

      border-radius: 25px;

      cursor: pointer;

      font-weight: bold;

      z-index: 1;

      position: relative;

    }

    button:hover {

      background: radial-gradient(circle, #4b3bff, #8c9eff);

    }

  </style>

</head>

<body>

  <h1>👩🏻 The Mysterious Girl and the Moon (니카조이) 🌙</h1>

  <div class="story" id="story">

    In the quiet night, she walked alone under the silver moonlight...

  </div>

  <button onclick="nextPart()">Next 🌌</button>

  <button onclick="resetStory()">Restart 🌙</button>

  <script>

    const storyParts = [

      "In the quiet night, she walked alone under the silver moonlight...",

      "Her eyes sparkled like stars, and a mysterious aura surrounded her ✨.",

      "She loved the moon more than anyone, feeling its calm magic pull her heart 🌕.",

      "Every night she whispered secrets to the moon, and it listened silently 🌌.",

      "Some say she was a shadow in the night, yet her love for the moon shined brighter than stars 🌠.",

      "The End 🌙"

    ];

    let index = 0;

    function nextPart() {

      index++;

      if(index >= storyParts.length) index = storyParts.length - 1;

      document.getElementById('story').textContent = storyParts[index];

    }

    function resetStory() {

      index = 0;

      document.getElementById('story').textContent = storyParts[index];

    }

  </script>

</body>

</html>
